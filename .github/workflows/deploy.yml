name: Moodle Plugin CI & Release

on:
  push:
    branches:
      - develop

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: enrol_dates

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: ctype, mbstring, libxml, mysqli, zip, gd, intl, soap, xmlrpc, curl, dom, iconv, json, xml, bcmath
          ini-values: memory_limit=-1 # Previne erros de memória no Composer

      - name: Install Moodle CI Tools
        run: |
          # 1. Clonar o repositório diretamente (evita erro de URL do composer)
          git clone https://github.com/moodlehq/moodle-plugin-ci.git $HOME/moodle-plugin-ci
          cd $HOME/moodle-plugin-ci
          
          # 2. Instalar as dependências dentro da pasta do tool
          # Usamos --no-dev para ser mais rápido e ignorar conflitos inúteis
          composer install --no-dev --no-interaction
          
          # 3. Tornar o binário executável e adicionar ao PATH do GitHub
          chmod +x bin/moodle-plugin-ci
          echo "$HOME/moodle-plugin-ci/bin" >> $GITHUB_PATH
          
          # 4. Verificar se funcionou
          export PATH="$HOME/moodle-plugin-ci/bin:$PATH"
          moodle-plugin-ci --version
        env:
          COMPOSER_NO_AUDIT: 1

      - name: Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h"127.0.0.1" -P"3306" -uroot -proot --silent; do
            echo "Aguardando MySQL..."
            sleep 2
          done

      - name: Initialize Moodle Environment
        env:
          DB: mysqli
        run: |
          moodle-plugin-ci install --plugin ./enrol_dates --branch MOODLE_405_STABLE --db-type mysqli --db-host 127.0.0.1 --db-user root --db-pass root --db-name moodle

      - name: Build JS
        run: |
          moodle-plugin-ci grunt ./enrol_dates

      - name: Validate Code Standards
        run: |
            moodle-plugin-ci codechecker availability/condition/enrol_dates


      - name: Create Tagged ZIP Bundle
        run: |
          ZIP_NAME="availability_enrol_dates-${{ github.ref_name }}.zip"
          cd $GITHUB_WORKSPACE
          zip -r $ZIP_NAME enrol_dates/ -x "enrol_dates/.git/*" "enrol_dates/node_modules/*" "enrol_dates/.github/*"
          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ZIP_FILENAME }}
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}