name: Moodle Plugin CI & Release

on:
  push:
    branches:
      - develop

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: enrol_dates

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: ctype, mbstring, libxml, mysqli, zip, gd, intl, soap, xmlrpc, curl, dom, iconv, json, xml, bcmath
          ini-values: memory_limit=-1 # Previne erros de memória no Composer

      - name: Install Moodle CI Tools
        run: |
          # 1. Configura o Composer para aceitar pacotes instáveis e ignorar avisos
          composer global config minimum-stability dev
          composer global config prefer-stable true
          
          # 2. Adiciona o repositório do Moodle CI direto do GitHub (Pula o 404 do packages.json)
          composer global config repositories.moodle-plugin-ci vcs https://github.com/moodlehq/moodle-plugin-ci
          
          # 3. Adiciona o repositório do sub-pacote local_ci que o Moodle escondeu
          composer global config repositories.moodle-local-ci vcs https://github.com/moodlehq/moodle-local_ci
          
          # 4. Instala forçando o bypass de segurança e auditoria
          # Usamos a branch master para garantir compatibilidade com Moodle 4.5
          composer global require moodlehq/moodle-plugin-ci:dev-master --no-audit --no-security-blocking --no-interaction
          
          # 5. Exporta para o PATH
          echo "$(composer global config bin-dir --absolute)" >> $GITHUB_PATH
        env:
          COMPOSER_NO_AUDIT: 1

      - name: Initialize Moodle Environment
        run: |
          moodle-plugin-ci install --plugin ./enrol_dates --moodle-branch MOODLE_405_STABLE

      - name: Build JS
        run: |
          moodle-plugin-ci grunt --extra="--path=availability/condition/enrol_dates"

      - name: Validate Code Standards
        run: |
            moodle-plugin-ci codechecker availability/condition/enrol_dates


      - name: Create Tagged ZIP Bundle
        run: |
          ZIP_NAME="availability_enrol_dates-${{ github.ref_name }}.zip"
          cd $GITHUB_WORKSPACE
          zip -r $ZIP_NAME enrol_dates/ -x "enrol_dates/.git/*" "enrol_dates/node_modules/*" "enrol_dates/.github/*"
          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ZIP_FILENAME }}
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}