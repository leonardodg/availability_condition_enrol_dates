name: Moodle Plugin CI & Release

on:
  push:
    branches:
      - develop

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: enrol_dates

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: ctype, mbstring, libxml, mysqli, zip, gd, intl, soap, xmlrpc, curl, dom, iconv, json, xml, bcmath
          ini-values: memory_limit=-1 # Previne erros de memória no Composer

      - name: Install Moodle CI Tools
        run: |
          # 1. Limpa o cache para evitar erros de sessões anteriores
          composer global clear-cache
          
          # 2. Adiciona o repositório oficial do Moodle (Essencial para achar o moodle-local_ci)
          composer global config repositories.moodle-plugins composer https://download.moodle.org/packages.json
          
          # 3. Define a estabilidade (Muitos pacotes do Moodle CI 4.5 ainda são marcados como dev/alpha)
          composer global config minimum-stability dev
          composer global config prefer-stable true
          
          # 4. Desativa TODAS as travas de segurança do Composer (O pulo do gato)
          composer global config audit.block-insecure false || true
          composer global config audit.ignore-advisories true || true
          
          # 5. Instala a versão 4.5.x explicitamente com flags de força
          # O uso de --no-audit e --no-security-blocking ignora os erros de pacotes antigos
          composer global require "moodlehq/moodle-plugin-ci:^4.5" --no-interaction --no-audit --no-security-blocking
          
          # 6. Exporta o binário para o PATH do GitHub Actions
          echo "$(composer global config bin-dir --absolute)" >> $GITHUB_PATH
        env:
          COMPOSER_NO_AUDIT: 1

      - name: Initialize Moodle Environment
        run: |
          moodle-plugin-ci install --plugin ./enrol_dates --moodle-branch MOODLE_405_STABLE

      - name: Build JS
        run: |
          moodle-plugin-ci grunt --extra="--path=availability/condition/enrol_dates"

      - name: Validate Code Standards
        run: |
            moodle-plugin-ci codechecker availability/condition/enrol_dates


      - name: Create Tagged ZIP Bundle
        run: |
          ZIP_NAME="availability_enrol_dates-${{ github.ref_name }}.zip"
          cd $GITHUB_WORKSPACE
          zip -r $ZIP_NAME enrol_dates/ -x "enrol_dates/.git/*" "enrol_dates/node_modules/*" "enrol_dates/.github/*"
          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ZIP_FILENAME }}
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}