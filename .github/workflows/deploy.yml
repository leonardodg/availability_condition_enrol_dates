name: Moodle Plugin CI & Release

on:
  push:
    branches:
      - develop

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: enrol_dates

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: ctype, mbstring, libxml, mysqli, zip, gd, intl, soap, xmlrpc, curl, dom, iconv, json, xml, bcmath

      - name: Install Moodle CI Tools
        run: |
          # 1. Clean up any previous failed attempts
          composer global config --unset repositories.moodle-plugins || true
          
          # 2. Tell composer NOT to block for security issues globally
          composer global config audit.block-insecure false || true
          
          # 3. Install the tool using flags to bypass the security check
          # Note: We use "moodlehq/moodle-plugin-ci:^4.5" to force a modern, compatible version
          composer global require "moodlehq/moodle-plugin-ci:^4.5" --no-audit --no-security-blocking
          
          # 4. Export to Path
          echo "$(composer global config bin-dir --absolute)" >> $GITHUB_PATH
        env:
          COMPOSER_NO_AUDIT: 1

      - name: Initialize Moodle Environment
        run: |
          moodle-plugin-ci install --plugin ./enrol_dates --moodle-branch MOODLE_405_STABLE

      - name: Build JS
        run: |
          moodle-plugin-ci grunt --extra="--path=availability/condition/enrol_dates"

      - name: Validate Code Standards
        run: |
            moodle-plugin-ci codechecker availability/condition/enrol_dates


      - name: Create Tagged ZIP Bundle
        run: |
          ZIP_NAME="availability_enrol_dates-${{ github.ref_name }}.zip"
          cd $GITHUB_WORKSPACE
          zip -r $ZIP_NAME enrol_dates/ -x "enrol_dates/.git/*" "enrol_dates/node_modules/*" "enrol_dates/.github/*"
          echo "ZIP_FILENAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ZIP_FILENAME }}
          generate_release_notes: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}